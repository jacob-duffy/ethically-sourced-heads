<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Head Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 28px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 32px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      background: #2c2c2c;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #5b9bd5; }

    button {
      padding: 10px 20px;
      background: #3a6ea8;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #4d83c2; }

    #error {
      color: #e07070;
      font-size: 0.85rem;
      margin-bottom: 20px;
      min-height: 1.2em;
    }

    .results {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 640px;
    }

    .panel {
      background: #242424;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .panel h2 {
      font-size: 0.95rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #headCanvas {
      width: 160px;
      height: 160px;
      border: 2px solid #444;
      border-radius: 4px;
      display: block;
    }

    #rawTexture {
      max-width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #444;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>Minecraft Head Viewer</h1>

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="Paste skin texture URL…" />
    <button onclick="load()">Load</button>
  </div>

  <div id="error"></div>

  <div class="results" id="results">
    <div class="panel">
      <h2>Face</h2>
      <canvas id="headCanvas" width="160" height="160"></canvas>
    </div>
    <div class="panel">
      <h2>Full Texture</h2>
      <img id="rawTexture" alt="skin texture" />
    </div>
  </div>

  <script>
    let gl = null;
    let skinTexture = null;
    let skinTexWidth = 64;
    let skinTexHeight = 64;
    let positionBuffer = null;
    let uvBuffer = null;
    let colorBuffer = null;
    let vertexCount = 0;
    let hatPositionBuffer = null;
    let hatUvBuffer = null;
    let hatVertexCount = 0;
    let shaderProgram = null;
    let animFrameId = null;
    let yaw = 0;
    let pitch = 0;
    const keys = { w: false, a: false, s: false, d: false };
    const ROTATION_SPEED = 0.02;

    document.addEventListener('keydown', function(e) {
      const k = e.key.toLowerCase();
      if (k in keys) { keys[k] = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', function(e) {
      const k = e.key.toLowerCase();
      if (k in keys) keys[k] = false;
    });

    function uploadTexture(image) {
      skinTexWidth  = image.naturalWidth  || image.width  || 64;
      skinTexHeight = image.naturalHeight || image.height || 64;
      if (skinTexture) {
        gl.deleteTexture(skinTexture);
      }
      skinTexture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, skinTexture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.bindTexture(gl.TEXTURE_2D, null);
    }

    // UV helper: px/py are pixel coords on the skin sheet (top-left origin).
    // Dimensions are read dynamically from the loaded image (e.g. 64x32 or 64x64).
    function uv(px, py) { return [px / skinTexWidth, py / skinTexHeight]; }

    // Returns the 6 UV pairs for a face quad (2 triangles, same winding as buildGeometry)
    // with a half-texel inset on every edge. This prevents floating-point imprecision from
    // sampling the wrong texel at the exact boundary between atlas regions.
    // (px1,py1) = top-left pixel of region (inclusive), (px2,py2) = bottom-right (exclusive).
    function faceUVQuad(px1, py1, px2, py2) {
      const u1 = (px1 + 0.5) / skinTexWidth,  u2 = (px2 - 0.5) / skinTexWidth;
      const v1 = (py1 + 0.5) / skinTexHeight, v2 = (py2 - 0.5) / skinTexHeight;
      return [[u1,v2],[u2,v2],[u2,v1],[u1,v2],[u2,v1],[u1,v1]];
    }

    function buildGeometry() {
      // Each face = 2 triangles (6 verts). Layout per vertex: x,y,z  u,v
      // Positions are on a unit cube centred at the origin (±0.5).
      // UVs map to the classic 64×64 Steve/Alex head layout.
      //
      //  Face   skin region (px)
      //  Front  (8,8)-(16,16)
      //  Back   (24,8)-(32,16)
      //  Top    (8,0)-(16,8)
      //  Bottom (16,0)-(24,8)
      //  Left   (0,8)-(8,16)
      //  Right  (16,8)-(24,16)

      const faces = [
        // --- Front (z = +0.5) ---
        { verts: [[-0.5,-0.5, 0.5],[0.5,-0.5, 0.5],[0.5, 0.5, 0.5],
                  [-0.5,-0.5, 0.5],[0.5, 0.5, 0.5],[-0.5, 0.5, 0.5]],
          uvs: faceUVQuad(8, 8, 16, 16) },

        // --- Back (z = -0.5, wound so front face is outward) ---
        { verts: [[ 0.5,-0.5,-0.5],[-0.5,-0.5,-0.5],[-0.5, 0.5,-0.5],
                  [ 0.5,-0.5,-0.5],[-0.5, 0.5,-0.5],[ 0.5, 0.5,-0.5]],
          uvs: faceUVQuad(24, 8, 32, 16) },

        // --- Top (y = +0.5) ---
        { verts: [[-0.5, 0.5, 0.5],[ 0.5, 0.5, 0.5],[ 0.5, 0.5,-0.5],
                  [-0.5, 0.5, 0.5],[ 0.5, 0.5,-0.5],[-0.5, 0.5,-0.5]],
          uvs: faceUVQuad(8, 0, 16, 8) },

        // --- Bottom (y = -0.5) ---
        { verts: [[-0.5,-0.5,-0.5],[ 0.5,-0.5,-0.5],[ 0.5,-0.5, 0.5],
                  [-0.5,-0.5,-0.5],[ 0.5,-0.5, 0.5],[-0.5,-0.5, 0.5]],
          uvs: faceUVQuad(16, 0, 24, 8) },

        // --- Left (x = -0.5, viewer's right) ---
        { verts: [[-0.5,-0.5,-0.5],[-0.5,-0.5, 0.5],[-0.5, 0.5, 0.5],
                  [-0.5,-0.5,-0.5],[-0.5, 0.5, 0.5],[-0.5, 0.5,-0.5]],
          uvs: faceUVQuad(0, 8, 8, 16) },

        // --- Right (x = +0.5) ---
        { verts: [[ 0.5,-0.5, 0.5],[ 0.5,-0.5,-0.5],[ 0.5, 0.5,-0.5],
                  [ 0.5,-0.5, 0.5],[ 0.5, 0.5,-0.5],[ 0.5, 0.5, 0.5]],
          uvs: faceUVQuad(16, 8, 24, 16) },
      ];

      const faceColors = [
        [1.0, 0.0, 0.0], // Front  — red
        [0.0, 0.0, 1.0], // Back   — blue
        [0.0, 1.0, 0.0], // Top    — green
        [1.0, 1.0, 0.0], // Bottom — yellow
        [1.0, 0.0, 1.0], // Left   — magenta
        [0.0, 1.0, 1.0], // Right  — cyan
      ];

      const positions = [];
      const uvCoords  = [];
      const colors    = [];
      for (let i = 0; i < faces.length; i++) {
        const face = faces[i];
        const col  = faceColors[i];
        for (const v of face.verts) positions.push(...v);
        for (const t of face.uvs)   uvCoords.push(...t);
        for (let v = 0; v < 6; v++) colors.push(...col);
      }
      vertexCount = positions.length / 3;

      if (positionBuffer) gl.deleteBuffer(positionBuffer);
      positionBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

      if (uvBuffer) gl.deleteBuffer(uvBuffer);
      uvBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, uvBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(uvCoords), gl.STATIC_DRAW);

      if (colorBuffer) gl.deleteBuffer(colorBuffer);
      colorBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.STATIC_DRAW);

      gl.bindBuffer(gl.ARRAY_BUFFER, null);
    }

    // Hat overlay layer — same texture, second skin layer region, scaled 1.125× outward.
    // Hat regions (both classic 64×32 and modern 64×64 have these in the same place):
    //  Face   skin region (px)
    //  Front  (40,8)-(48,16)
    //  Back   (56,8)-(64,16)
    //  Top    (40,0)-(48,8)
    //  Bottom (48,0)-(56,8)
    //  Left   (32,8)-(40,16)
    //  Right  (48,8)-(56,16)
    function buildHatGeometry() {
      const S = 0.5625; // half-extent: 1.125 × the head's 0.5
      const faces = [
        // --- Front (z = +S) ---
        { verts: [[-S,-S, S],[ S,-S, S],[ S, S, S],
                  [-S,-S, S],[ S, S, S],[-S, S, S]],
          uvs: faceUVQuad(40, 8, 48, 16) },

        // --- Back (z = -S) ---
        { verts: [[ S,-S,-S],[-S,-S,-S],[-S, S,-S],
                  [ S,-S,-S],[-S, S,-S],[ S, S,-S]],
          uvs: faceUVQuad(56, 8, 64, 16) },

        // --- Top (y = +S) ---
        { verts: [[-S, S, S],[ S, S, S],[ S, S,-S],
                  [-S, S, S],[ S, S,-S],[-S, S,-S]],
          uvs: faceUVQuad(40, 0, 48, 8) },

        // --- Bottom (y = -S) ---
        { verts: [[-S,-S,-S],[ S,-S,-S],[ S,-S, S],
                  [-S,-S,-S],[ S,-S, S],[-S,-S, S]],
          uvs: faceUVQuad(48, 0, 56, 8) },

        // --- Left (x = -S) ---
        { verts: [[-S,-S,-S],[-S,-S, S],[-S, S, S],
                  [-S,-S,-S],[-S, S, S],[-S, S,-S]],
          uvs: faceUVQuad(32, 8, 40, 16) },

        // --- Right (x = +S) ---
        { verts: [[ S,-S, S],[ S,-S,-S],[ S, S,-S],
                  [ S,-S, S],[ S, S,-S],[ S, S, S]],
          uvs: faceUVQuad(48, 8, 56, 16) },
      ];

      const positions = [];
      const uvCoords  = [];
      for (const face of faces) {
        for (const v of face.verts) positions.push(...v);
        for (const t of face.uvs)   uvCoords.push(...t);
      }
      hatVertexCount = positions.length / 3;

      if (hatPositionBuffer) gl.deleteBuffer(hatPositionBuffer);
      hatPositionBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, hatPositionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

      if (hatUvBuffer) gl.deleteBuffer(hatUvBuffer);
      hatUvBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, hatUvBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(uvCoords), gl.STATIC_DRAW);

      gl.bindBuffer(gl.ARRAY_BUFFER, null);
    }

    // --- Inline matrix math (column-major Float32Array, no external lib) ---

    function mat4Multiply(a, b) {
      const out = new Float32Array(16);
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 4; col++) {
          let sum = 0;
          for (let k = 0; k < 4; k++) sum += a[k * 4 + row] * b[col * 4 + k];
          out[col * 4 + row] = sum;
        }
      }
      return out;
    }

    function mat4Perspective(fovRad, aspect, near, far) {
      const f = 1.0 / Math.tan(fovRad / 2);
      const nf = 1 / (near - far);
      return new Float32Array([
        f / aspect, 0,  0,                    0,
        0,          f,  0,                    0,
        0,          0,  (far + near) * nf,   -1,
        0,          0,  2 * far * near * nf,  0,
      ]);
    }

    function mat4LookAt(eye, center, up) {
      const normalize = v => { const l = Math.hypot(...v); return v.map(x => x / l); };
      const cross = (a, b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
      const dot   = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];

      const f = normalize([center[0]-eye[0], center[1]-eye[1], center[2]-eye[2]]);
      const s = normalize(cross(f, up));
      const u = cross(s, f);

      return new Float32Array([
         s[0],  u[0], -f[0], 0,
         s[1],  u[1], -f[1], 0,
         s[2],  u[2], -f[2], 0,
        -dot(s, eye), -dot(u, eye), dot(f, eye), 1,
      ]);
    }

    function mat4RotateY(a) {
      const c = Math.cos(a), s = Math.sin(a);
      return new Float32Array([
         c, 0, -s, 0,
         0, 1,  0, 0,
         s, 0,  c, 0,
         0, 0,  0, 1,
      ]);
    }

    function mat4RotateX(a) {
      const c = Math.cos(a), s = Math.sin(a);
      return new Float32Array([
        1,  0, 0, 0,
        0,  c, s, 0,
        0, -s, c, 0,
        0,  0, 0, 1,
      ]);
    }

    function buildMVP() {
      const fov   = 45 * Math.PI / 180;
      const proj  = mat4Perspective(fov, 1.0, 0.1, 100.0);
      const view  = mat4LookAt([0, 0.3, 2.5], [0, 0, 0], [0, 1, 0]);
      const model = mat4Multiply(mat4RotateX(pitch), mat4RotateY(yaw));
      return mat4Multiply(proj, mat4Multiply(view, model));
    }

    function compileShaders(errorEl) {
      const vsSource = `
        attribute vec3 a_position;
        attribute vec2 a_uv;
        uniform mat4 u_mvp;
        varying vec2 v_uv;
        void main() {
          v_uv = a_uv;
          gl_Position = u_mvp * vec4(a_position, 1.0);
        }
      `;

      const fsSource = `
        precision mediump float;
        varying vec2 v_uv;
        uniform sampler2D u_texture;
        void main() {
          vec4 color = texture2D(u_texture, v_uv);
          if (color.a < 0.1) discard;
          gl_FragColor = color;
        }
      `;

      function compile(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          const log = gl.getShaderInfoLog(shader);
          gl.deleteShader(shader);
          throw new Error('Shader compile error: ' + log);
        }
        return shader;
      }

      const vs = compile(gl.VERTEX_SHADER,   vsSource);
      const fs = compile(gl.FRAGMENT_SHADER, fsSource);

      if (shaderProgram) gl.deleteProgram(shaderProgram);
      shaderProgram = gl.createProgram();
      gl.attachShader(shaderProgram, vs);
      gl.attachShader(shaderProgram, fs);
      gl.linkProgram(shaderProgram);
      gl.deleteShader(vs);
      gl.deleteShader(fs);

      if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
        const log = gl.getProgramInfoLog(shaderProgram);
        gl.deleteProgram(shaderProgram);
        shaderProgram = null;
        throw new Error('Program link error: ' + log);
      }
    }

    function initGL() {
      if (gl) return true; // reuse existing context on reload
      const canvas = document.getElementById('headCanvas');
      gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      return gl !== null;
    }

    // One-time setup: compile shaders (geometry is built after texture upload so
    // that UV coordinates use the correct image dimensions).
    function setupOnce(errorEl) {
      compileShaders(errorEl);
    }

    let setupDone = false;

    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') load();
    });

    function draw() {
      gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
      gl.clearColor(0.14, 0.14, 0.14, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      const mvp = buildMVP();

      gl.enable(gl.DEPTH_TEST);

      gl.useProgram(shaderProgram);

      const aPosition = gl.getAttribLocation(shaderProgram, 'a_position');
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.enableVertexAttribArray(aPosition);
      gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

      const aUV = gl.getAttribLocation(shaderProgram, 'a_uv');
      gl.bindBuffer(gl.ARRAY_BUFFER, uvBuffer);
      gl.enableVertexAttribArray(aUV);
      gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

      gl.uniformMatrix4fv(gl.getUniformLocation(shaderProgram, 'u_mvp'), false, mvp);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, skinTexture);
      gl.uniform1i(gl.getUniformLocation(shaderProgram, 'u_texture'), 0);

      gl.drawArrays(gl.TRIANGLES, 0, vertexCount);

      gl.disableVertexAttribArray(aPosition);
      gl.disableVertexAttribArray(aUV);

      // --- Hat overlay (second skin layer, 1.125× cube, alpha-blended) ---
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

      gl.useProgram(shaderProgram);

      gl.bindBuffer(gl.ARRAY_BUFFER, hatPositionBuffer);
      gl.enableVertexAttribArray(aPosition);
      gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

      gl.bindBuffer(gl.ARRAY_BUFFER, hatUvBuffer);
      gl.enableVertexAttribArray(aUV);
      gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

      gl.uniformMatrix4fv(gl.getUniformLocation(shaderProgram, 'u_mvp'), false, mvp);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, skinTexture);
      gl.uniform1i(gl.getUniformLocation(shaderProgram, 'u_texture'), 0);

      gl.drawArrays(gl.TRIANGLES, 0, hatVertexCount);

      gl.disableVertexAttribArray(aPosition);
      gl.disableVertexAttribArray(aUV);
      gl.disable(gl.BLEND);

      gl.bindBuffer(gl.ARRAY_BUFFER, null);
      gl.bindTexture(gl.TEXTURE_2D, null);
      gl.useProgram(null);
    }

    function load() {
      const url = document.getElementById('urlInput').value.trim();
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      document.getElementById('results').style.display = 'none';

      if (!url) {
        errorEl.textContent = 'Please enter a URL.';
        return;
      }

      const img = new Image();
      img.crossOrigin = 'anonymous';

      img.onload = function () {
        if (!initGL()) {
          errorEl.textContent = 'WebGL is not supported in this browser.';
          return;
        }

        if (!setupDone) {
          try {
            setupOnce(errorEl);
            setupDone = true;
          } catch (e) {
            errorEl.textContent = e.message;
            return;
          }
        }

        uploadTexture(img);
        buildGeometry();    // rebuild UVs using the just-determined texture dimensions
        buildHatGeometry(); // rebuild hat UVs with the same dimensions
        if (animFrameId !== null) {
          cancelAnimationFrame(animFrameId);
          animFrameId = null;
        }

        function loop() {
          if (!skinTexture) return; // guard: no texture yet, don't render
          if (keys.a) yaw   -= ROTATION_SPEED;
          if (keys.d) yaw   += ROTATION_SPEED;
          if (keys.w) pitch -= ROTATION_SPEED;
          if (keys.s) pitch += ROTATION_SPEED;
          const half = Math.PI / 2;
          pitch = Math.max(-half, Math.min(half, pitch));
          draw();
          animFrameId = requestAnimationFrame(loop);
        }
        animFrameId = requestAnimationFrame(loop);

        document.getElementById('rawTexture').src = url;
        document.getElementById('results').style.display = 'flex';
      };

      img.onerror = function () {
        errorEl.textContent = 'Failed to load image. Check the URL and try again.';
      };

      img.src = url;
    }
  </script>

</body>
</html>
